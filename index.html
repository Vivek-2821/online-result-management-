<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Result Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="glass-card main-form-card">
            <div class="header">
                <h1>Result Entry Portal</h1>
                <p>Enter student details and marks below</p>
            </div>

            <form action="result.php" method="POST" id="resultForm">
                <div class="form-section">
                    <h3>Student Details</h3>
                    <div class="input-group">
                        <label for="studentName">Student Name</label>
                        <input type="text" id="studentName" name="studentName" placeholder="e.g. Jane Doe" required>
                    </div>
                    <div class="input-group">
                        <label for="rollNumber">Roll Number</label>
                        <input type="text" id="rollNumber" name="rollNumber" placeholder="e.g. CS-2023-01" required>
                    </div>
                    <div class="input-group">
                        <label for="prevCgpa">Previous CGPA (Optional)</label>
                        <input type="number" id="prevCgpa" name="prevCgpa" step="0.01" min="0" max="10" placeholder="e.g. 8.5">
                    </div>
                </div>

                <div class="form-section">
                    <h3>Subject Marks (out of 100)</h3>
                    <div class="subjects-grid">
                        <div class="input-group">
                            <label for="cn">Computer Networks</label>
                            <input type="number" id="cn" name="cn" class="mark-input" min="0" max="100" placeholder="0-100" required>
                        </div>
                        <div class="input-group">
                            <label for="os">Operating Systems</label>
                            <input type="number" id="os" name="os" class="mark-input" min="0" max="100" placeholder="0-100" required>
                        </div>
                        <div class="input-group">
                            <label for="dbms">Database Mgmt Systems</label>
                            <input type="number" id="dbms" name="dbms" class="mark-input" min="0" max="100" placeholder="0-100" required>
                        </div>
                        <div class="input-group">
                            <label for="se">Software Engineering</label>
                            <input type="number" id="se" name="se" class="mark-input" min="0" max="100" placeholder="0-100" required>
                        </div>
                        <div class="input-group">
                            <label for="wt">Web Technologies</label>
                            <input type="number" id="wt" name="wt" class="mark-input" min="0" max="100" placeholder="0-100" required>
                        </div>
                    </div>
                </div>

                <div class="live-preview glass-panel">
                    <h3>Live Calculation</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <span class="stat-label">Total Marks</span>
                            <span class="stat-value" id="liveTotal">0 / 500</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Percentage</span>
                            <span class="stat-value" id="livePercentage">0%</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">SGPA</span>
                            <span class="stat-value" id="liveSGPA">0.00</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">CGPA</span>
                            <span class="stat-value" id="liveCGPA">0.00</span>
                        </div>
                        <div class="stat-box highlight-box">
                            <span class="stat-label">Est. Grade</span>
                            <span class="stat-value" id="liveGrade">-</span>
                        </div>
                    </div>
                </div>

                <!-- Hidden inputs to send live calculation data to PHP -->
                <input type="hidden" id="hiddenTotal" name="totalMarks" value="0">
                <input type="hidden" id="hiddenPercentage" name="percentage" value="0">
                <input type="hidden" id="hiddenGrade" name="grade" value="-">
                <input type="hidden" id="hiddenSGPA" name="sgpa" value="0.00">
                <input type="hidden" id="hiddenCGPA" name="cgpa" value="0.00">

                <button type="submit" class="submit-btn" id="submitBtn">Generate Result</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
